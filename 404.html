<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagina no encontrada – Lecturameter</title>
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="stylesheet" href="styles.css">
    <style>
        .error-page{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;text-align:center;padding:2rem}
        .error-page img{width:80px;height:80px;margin-bottom:1.5rem;border-radius:22%}
        .error-page h1{font-size:2rem;margin-bottom:.5rem}
        .error-page p{color:#aaa;margin-bottom:2rem;max-width:400px}
        .error-page a{background:var(--accent,#5865f2);color:#fff;padding:.75rem 2rem;border-radius:12px;text-decoration:none;font-weight:600}
        .error-page a:hover{opacity:.9}
    </style>
</head>
<body>
<div class="error-page">
    <img src="ic_launcher_round.png" alt="Lecturameter">
    <h1>404</h1>
    <p>Esta pagina no existe. Puede que el enlace haya cambiado o que hayas escrito mal la direccion.</p>
    <a href="index.html">Volver al inicio</a>
</div>
</body>
</html>
